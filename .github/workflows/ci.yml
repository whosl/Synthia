name: EdAgent-Vivado CI

on:
  push:
    branches: [main, develop]
    paths-ignore: ['docs/**', '*.md']
  pull_request:
    branches: [main]
    paths-ignore: ['docs/**', '*.md']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: pip install -e ".[dev]"

      - name: Run tests (no agent smoke)
        run: python -m pytest tests/ -v -k "not agent_smoke" --tb=short

      - name: Run CLI smoke
        run: |
          python -m edagent_vivado.cli diagnose-log examples/uart_demo/logs/sample_vivado_error.log
          python -m edagent_vivado.cli run-synth examples/uart_demo/eda.yaml

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install mypy ruff
      - run: ruff check src/ tests/
        continue-on-error: true
      - run: mypy src/edagent_vivado --ignore-missing-imports --no-error-summary
        continue-on-error: true

  agent-smoke:
    name: Agent Smoke Test
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'run-agent')
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      LANGSMITH_TRACING: true
      LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
      LANGSMITH_PROJECT: edagent-vivado-ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -e ".[dev]"
      - name: Run agent smoke tests
        if: env.ANTHROPIC_API_KEY != ''
        run: python -m pytest tests/test_agent_smoke.py -v --tb=short
      - name: Skip (no API key)
        if: env.ANTHROPIC_API_KEY == ''
        run: echo "Skipping agent smoke tests (no ANTHROPIC_API_KEY secret)"

  web-smoke:
    name: Web Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -e ".[web,dev]"
      - name: Verify web module imports
        run: python -c "from edagent_vivado.web.app import create_app; assert create_app()"
