version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: synthia
      POSTGRES_PASSWORD: synthia
      POSTGRES_DB: synthia
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synthia"]
      interval: 5s
      timeout: 3s
      retries: 5
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    ports:
      - "6379:6379"

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SYNTHIA_DB_BACKEND: postgres
      SYNTHIA_DB_URL: postgresql+psycopg://synthia:synthia@postgres:5432/synthia
      SYNTHIA_REDIS_URL: redis://redis:6379/0
      SYNTHIA_USE_WORKER_QUEUE: "1"
      SYNTHIA_LICENSE_POOLS: vivado:2
    ports:
      - "8484:8484"
    volumes:
      - syndata:/root/.synthia

  worker-vivado:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SYNTHIA_DB_BACKEND: postgres
      SYNTHIA_DB_URL: postgresql+psycopg://synthia:synthia@postgres:5432/synthia
      SYNTHIA_REDIS_URL: redis://redis:6379/0
      SYNTHIA_WORKER_POOL: vivado
      SYNTHIA_LICENSE_POOLS: vivado:2
      VIVADO_REMOTE_HOST: ${VIVADO_REMOTE_HOST:-}
      VIVADO_REMOTE_USER: ${VIVADO_REMOTE_USER:-}
    deploy:
      replicas: 2
    volumes:
      - syndata:/root/.synthia

volumes:
  pgdata:
  redisdata:
  syndata:
